syntax = "proto3";

package embedding.v1;

option go_package = "github.com/IanStuardo-Dev/backend-crud/internal/infrastructure/embedding/grpcpb;grpcpb";

service EmbeddingService {
  rpc Embed(EmbedRequest) returns (EmbedResponse);
}

message EmbedRequest {
  string text = 1;
}

message EmbedResponse {
  repeated float embedding = 1;
  int32 dimensions = 2;
  int32 base_dimensions = 3;
  string model = 4;
}
