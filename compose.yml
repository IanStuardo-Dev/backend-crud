services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: go-crud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d go-crud"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: go-crud
      DB_SSLMODE: disable
      JWT_SECRET: dev-secret-change-me
      JWT_ISSUER: crud-api
      JWT_TTL: 24h
    ports:
      - "8080:8080"

volumes:
  db-data:
