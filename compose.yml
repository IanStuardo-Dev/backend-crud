services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: go-crud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d go-crud"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data

  embedding-service:
    build:
      context: ./services/embedding-service
    environment:
      EMBEDDING_MODEL: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      EMBEDDING_TARGET_DIMENSIONS: "1536"
      EMBEDDING_DEVICE: cpu
      PORT: "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    ports:
      - "8000:8000"
    volumes:
      - embedding-model-cache:/models

  api:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: go-crud
      DB_SSLMODE: disable
      JWT_SECRET: dev-secret-change-me
      JWT_ISSUER: crud-api
      JWT_TTL: 24h
      EMBEDDING_PROVIDER: local-semantic-service
      EMBEDDING_SERVICE_URL: http://embedding-service:8000
      EMBEDDING_REQUEST_TIMEOUT: 45s
    ports:
      - "8080:8080"

volumes:
  db-data:
  embedding-model-cache:
